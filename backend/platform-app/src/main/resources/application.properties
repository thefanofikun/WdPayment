spring.application.name=channel-gateway
server.port=8080
management.endpoints.web.exposure.include=health,info
gateway.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DEFAULT_DB:gateway_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# SGB channel integration
# The published docs expose relative paths only. Set api-base-url to the real SGB environment host you receive.
gateway.channel.sgb.enabled=true
gateway.channel.sgb.api-base-url=
gateway.channel.sgb.client-key=
# Accepts a PKCS8 PEM body or a single-line base64 encoded EC private key.
gateway.channel.sgb.private-key-pem=
